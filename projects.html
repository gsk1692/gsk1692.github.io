<div class="container">
    {% for project in site.projects %}
        <h1>{{ project.title }}</h1>

        <div class="entry">
            {{ project.description }}
        </div>
        <br>
        <a href="{{ site.baseurl }}{{ project.url }}" class="read-more">Read More</a>
    {% endfor %}
</div>
