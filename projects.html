---
layout: default
title: Projects
permalink: /projects/
---

<div class="container">
    {% for project in site.projects %}
        <article class="post">
            <h1><a href="{{ site.baseurl }}{{ project.url }}">{{ project.title }}</a></h1>

            <div class="entry">
                {{ project.description }}
            </div>
            <br>
            <a href="{{ site.baseurl }}{{ project.url }}" class="read-more">Read More</a>
        </article>
    {% endfor %}
</div>
